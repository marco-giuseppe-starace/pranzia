name: CI

# Esegue lint/test su ogni push e pull request verso main, in due job
# paralleli e indipendenti (backend Laravel e frontend Vue).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest

    # Database MySQL disponibile come servizio per i test che useranno il DB.
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_DATABASE: pranzia
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Installa dipendenze Composer
        run: composer install --no-interaction --prefer-dist

      - name: Configura ambiente di test
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Esegui i test (Pest)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: pranzia
          DB_USERNAME: root
          DB_PASSWORD:
        run: ./vendor/bin/pest

  frontend:
    name: Frontend (Vue)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installa dipendenze npm
        run: npm ci

      - name: Build di produzione
        run: npm run build
